spring.application.name=Yagimail

# IMAP Settings
mail.imap.host=${MAIL_IMAP_HOST}
mail.imap.port=993
mail.imap.username=${MAIL_IMAP_USERNAME}
mail.imap.password=${MAIL_IMAP_PASSWORD}
mail.imap.protocol=imaps
mail.imap.trash=${MAIL_IMAP_TRASH:Trash}

# Google OAuth
google.client-id=${GOOGLE_CLIENT_ID}

# Internal JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
